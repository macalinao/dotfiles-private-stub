name: "Check & Cachix"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        runsOn:
          - ubuntu-22.04
          - macos-15-intel
          - macos-26
    runs-on: ${{ matrix.runsOn }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: igm
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix flake check --print-build-logs --show-trace
